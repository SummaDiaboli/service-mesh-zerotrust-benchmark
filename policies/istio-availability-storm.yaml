# 1. L7 Timeouts for audit-logger
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: combined-audit-storm-timeouts
  namespace: ns-istio
spec:
  hosts:
  - audit-logger
  http:
  - timeout: 2s
    route:
    - destination:
        host: audit-logger
---
# 2. Local Rate Limiting for audit-logger
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: combined-audit-rate-limit
  namespace: ns-istio
spec:
  workloadSelector:
    labels:
      app: audit-logger
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
              subFilter:
                name: "envoy.filters.http.router"
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.local_ratelimit
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
            stat_prefix: http_local_rate_limiter
            token_bucket:
              max_tokens: 20
              tokens_per_fill: 20
              fill_interval: 1s
            filter_enabled:
              runtime_key: local_rate_limit_enabled
              default_value:
                numerator: 100
                denominator: HUNDRED
            filter_enforced:
              runtime_key: local_rate_limit_enforced
              default_value:
                numerator: 100
                denominator: HUNDRED
