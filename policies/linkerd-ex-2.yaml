apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: payment-8080
  namespace: ns-linkerd
spec:
  podSelector:
    matchLabels:
      app: payment-service
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: allow-all-payment
  namespace: ns-linkerd
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: payment-8080
  requiredAuthenticationRefs:
    - name: allow-all-network
      kind: NetworkAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: allow-all-network
  namespace: ns-linkerd
spec:
  networks:
    - cidr: "0.0.0.0/0"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: HTTPLocalRateLimitPolicy
metadata:
  name: payment-flood-defense
  namespace: ns-linkerd
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: payment-8080
  total:
    requestsPerSecond: 100
  identity:
    requestsPerSecond: 20
