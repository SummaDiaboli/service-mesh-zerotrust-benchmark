# 1. Define the Server for backend-api (Port 3000)
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: chain-backend-3000
  namespace: ns-linkerd
spec:
  podSelector:
    matchLabels:
      app: backend-api
  port: 3000
  proxyProtocol: HTTP/1
---
# 2. Define the "Safe" Route (Block /api/internal by omission)
apiVersion: policy.linkerd.io/v1beta3
kind: HTTPRoute
metadata:
  name: chain-backend-safe-route
  namespace: ns-linkerd
spec:
  parentRefs:
    - name: chain-backend-3000
      kind: Server
      group: policy.linkerd.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/users"
---
# 3. AUTHORIZE the "Safe" Route
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: chain-allow-safe-backend
  namespace: ns-linkerd
spec:
  targetRef:
    group: policy.linkerd.io
    kind: HTTPRoute
    name: chain-backend-safe-route
  requiredAuthenticationRefs:
    - name: allow-all-mesh
      kind: NetworkAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: allow-all-mesh
  namespace: ns-linkerd
spec:
  networks:
    - cidr: "0.0.0.0/0"
---
# 4. Egress Placeholder (Limitation Note)
apiVersion: v1
kind: ConfigMap
metadata:
  name: chain-linkerd-egress-limit
  namespace: ns-linkerd
data:
  limitation: "Linkerd natively allows all external egress."
