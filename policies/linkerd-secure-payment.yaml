# 1. Define the Server (The Listening Port)
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: payment-8080
  namespace: ns-linkerd
spec:
  podSelector:
    matchLabels:
      app: payment-service
  port: 8080
  proxyProtocol: HTTP/1
---
# 2. Define the "Safe" Route (The /process endpoint)
apiVersion: policy.linkerd.io/v1beta3
kind: HTTPRoute
metadata:
  name: payment-process-route
  namespace: ns-linkerd
spec:
  parentRefs:
    - name: payment-8080
      kind: Server
      group: policy.linkerd.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/process"
---
# 3. AUTHORIZE the "Safe" Route
# We allow "NetworkAuthentication" (IP-based) because your load generator
# is running unmeshed from the default namespace.
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: allow-process
  namespace: ns-linkerd
spec:
  targetRef:
    group: policy.linkerd.io
    kind: HTTPRoute
    name: payment-process-route
  requiredAuthenticationRefs:
    - name: allow-all-ips
      kind: NetworkAuthentication
      group: policy.linkerd.io
---
# 4. Define "Anyone" (0.0.0.0/0) as a valid source
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: allow-all-ips
  namespace: ns-linkerd
spec:
  networks:
    - cidr: "0.0.0.0/0"
